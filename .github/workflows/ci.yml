# CI — runs on every push/PR to main.
#
# Gating policy (intentional):
#   - BLOCKING:     unit tests (jest, frontend + backend) and the production build.
#   - REPORT-ONLY:  eslint and `tsc --noEmit` (pre-existing debt; visible but not
#                   blocking yet — flip to blocking once burned down).
#   - GATED/OPT-IN: Playwright e2e (needs a live server + seeded DB + TEST_USER).
#                   Runs only when a PR carries the `run-e2e` label.
#
# Notes baked in from the 2026-06-05 test pass:
#   - NEVER rely on committed node_modules. CI must `npm ci` so the correct
#     platform-native @next/swc binary is resolved on the runner (the working
#     tree had a win32 SWC binary on an arm64 mac).
#   - Jest needs the next-auth ESM transform fix in jest.config.js (override of
#     next/jest's transformIgnorePatterns) — already applied.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-unit:
    name: Build + Unit (jest) [blocking] · Lint + Typecheck [report-only]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Clean install — resolves the correct platform-native SWC binary per runner.
      - name: Install deps
        run: npm ci

      # 1. Unit tests (frontend + backend). BLOCKING.
      - name: Unit tests (jest)
        run: npm test -- --ci --runInBand
        env:
          CI: "true"

      # 2. Production build. BLOCKING. Build-time data fetches fail soft (pages
      #    render, log ECONNREFUSED) so a live DB is not required just to compile.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # 3. Lint — REPORT-ONLY until existing errors are burned down. Flip later.
      - name: Lint (report-only)
        run: npm run lint
        continue-on-error: true

      # 4. Typecheck — REPORT-ONLY until existing tsc errors are fixed. Flip later.
      - name: Typecheck (report-only)
        run: npx tsc --noEmit
        continue-on-error: true

  e2e:
    name: E2E (Playwright — desktop + mobile chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-unit
    # Opt-in: needs a seeded test DB + TEST_USER. Add the `run-e2e` label to a PR
    # to trigger, so a missing DB/creds can't hang or flake the required gate.
    if: contains(github.event.pull_request.labels.*.name, 'run-e2e')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gglobby_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      # TODO: run DB migrations + seed against localhost:5433 and create TEST_USER
      #       before this step (tracked as a follow-up). Playwright's webServer
      #       config auto-starts `npm run dev`, so no separate server step is needed.
      - name: Run e2e (chromium desktop + mobile, to bound runtime)
        run: npx playwright test --project=chromium-desktop --project=mobile-chrome
        env:
          BASE_URL: http://localhost:3000
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
